<!DOCTYPE html>

<html lang="ru">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Constellation Quiz</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'quiz/css/style.css' %}">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: white;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 40px;
            color: rgba(255,255,255,0.9);
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-large {
            padding: 15px 30px;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 32px;
            }
            .hero p {
                font-size: 16px;
            }
            .btn-large {
                padding: 12px 20px;
                font-size: 16px;
            }
        }

    </style>
</head>

<body>
    <div class="hero">
        <h1>Constellation Quiz</h1>
        <p>Погрузись в мир звёзд и созвездий!</p>
        
        <div class="buttons">
            <a href="/constellations/" class="btn btn-large">Все созвездия</a>
            <a href="{% url 'quiz_question' %}" class="btn btn-large">Викторина</a>            
            <a href="{% url 'constellation_create' %}" class="btn btn-large">Добавить созвездие</a>
        </div>
    </div>
</body>

</html>
