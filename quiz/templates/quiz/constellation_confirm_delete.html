<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">

    <title>Удалить созвездие - Constellation Quiz</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .nav-links {
            text-align: center;
            margin: 20px 0;
        }

        .nav-links a {
            margin: 0 10px;
            color: #3498db;
            text-decoration: none;
        }

        .confirm-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #e74c3c;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        .btn-secondary {
            background-color: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #7f8c8d;
        }
    </style>
</head>

<body>
    <div class="nav-links">
        <a href="/">Главная</a>
        <a href="/constellations/">Созвездия</a>
    </div>

    <div class="confirm-container">
        <h1>Подтверждение удаления</h1>
        <p>Вы уверены, что хотите удалить созвездие <strong>"{{ constellation.name_ru }}"</strong>?</p>
        <p style="font-size: 14px; color: #e74c3c;">Это действие нельзя отменить!</p>
        
        <div class="button-group">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Да, удалить</button>
            </form>
            <a href="{% url 'constellation_detail' constellation.pk %}" class="btn btn-secondary">Отмена</a>
        </div>
    </div>
</body>

</html>
